name: Deploy to VDS

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Create build config
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
        run: sed "s/PLACEHOLDER/$VDS_HOST/" .github/workflows/build-config.hjson > survev-config.hjson

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy artifacts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          source: "server/dist/,client/dist/,server/src/api/db/,server/src/api/drizzle.config.ts,server/package.json"
          target: "/opt/survev/"

      - name: Migrate and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            cd /opt/survev/server
            CI=true pnpm install --no-frozen-lockfile
            pnpm db:migrate
            chown -R www-data:www-data /opt/survev/client/dist
            systemctl reload nginx
            systemctl restart survev-api
            systemctl restart survev-game
            echo "nginx:       $(systemctl is-active nginx)"
            echo "survev-api:  $(systemctl is-active survev-api)"
            echo "survev-game: $(systemctl is-active survev-game)"